<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA Support Tool - 教室管理ツール</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 TA Support Tool</h1>
            <p>座席配置・課題採点シート・出席票を簡単生成</p>
        </header>

        <main>
            <!-- ステップ1: 名簿アップロード -->
            <section id="step1" class="step">
                <h2>📋 ステップ 1: 名簿をアップロード</h2>
                <div class="card">
                    <label for="csvFile">CSV ファイルをアップロード：</label>
                    <input type="file" id="csvFile" accept=".csv" />
                    <p class="help-text">名簿数が下記に表示されます</p>
                    <div id="uploadStatus" class="status-message"></div>
                </div>
            </section>

            <!-- ステップ2: 座席配置設定 -->
            <section id="step2" class="step" style="display: none;">
                <h2>💺 ステップ 2: 座席配置を設定</h2>
                <div class="card">
                    <label>座席レイアウトを選択：</label>
                    <div class="layout-options">
                        <label class="radio-option">
                            <input type="radio" name="layout" value="grid" checked />
                            <span>グリッド配置（列数と行を指定）</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="layout" value="mixed" />
                            <span>混合配置（3人席 + 2人席）</span>
                        </label>
                    </div>

                    <div id="gridConfig" class="config-section">
                        <label for="cols">列数：<input type="number" id="cols" min="1" max="20" value="10" /></label>
                        <label for="rows">行数：<input type="number" id="rows" min="1" max="30" value="15" /></label>
                    </div>

                    <div id="mixedConfig" class="config-section" style="display: none;">
                        <label for="threeSeatRows">3人席の列数：<input type="number" id="threeSeatRows" min="1" max="20" value="5" /></label>
                        <label for="twoSeatRows">2人席の列数：<input type="number" id="twoSeatRows" min="1" max="20" value="10" /></label>
                    </div>

                    <p class="help-text" id="seatInfo">座席計算中...</p>
                </div>
            </section>

            <!-- ステップ3: 出力設定 -->
            <section id="step3" class="step" style="display: none;">
                <h2>⚙️ ステップ 3: 出力ファイルを選択</h2>
                <div class="card">
                    <fieldset>
                        <legend>生成するファイル：</legend>
                        <label class="checkbox-option">
                            <input type="checkbox" id="generate-seating" checked />
                            <span>座席表</span>
                        </label>
                        <label class="checkbox-option">
                            <input type="checkbox" id="generate-grading" />
                            <span>課題採点シート</span>
                        </label>
                        <label class="checkbox-option">
                            <input type="checkbox" id="generate-attendance" />
                            <span>出席票</span>
                        </label>
                    </fieldset>

                    <div id="gradingConfig" class="config-section" style="display: none;">
                        <label for="numAssignments">課題数：<input type="number" id="numAssignments" min="1" max="20" value="10" /></label>
                    </div>

                    <div id="attendanceConfig" class="config-section" style="display: none;">
                        <label for="numWeeks">講義回数（週数）：<input type="number" id="numWeeks" min="1" max="20" value="15" /></label>
                        <label for="startDate">開始日：<input type="date" id="startDate" /></label>
                    </div>
                </div>
            </section>

            <!-- ステップ4: 生成 -->
            <section id="step4" class="step" style="display: none;">
                <h2>🎯 ステップ 4: ファイルを生成</h2>
                <div class="card">
                    <button id="generateBtn" class="btn btn-primary btn-large">ファイルを生成</button>
                    <div id="generationStatus" class="status-message"></div>
                </div>
            </section>

            <!-- ダウンロード完了 -->
            <section id="stepFinal" class="step" style="display: none;">
                <h2>✅ 完了！</h2>
                <div class="card success">
                    <p>ファイルが生成されました：</p>
                    <ul id="downloadList"></ul>
                    <button id="resetBtn" class="btn btn-secondary">リセット</button>
                </div>
            </section>
        </main>

        <footer>
            <p>TA Support Tool v1.0 | <a href="https://github.com">GitHub</a></p>
        </footer>
    </div>

    <!-- ライブラリの読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/generator.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
